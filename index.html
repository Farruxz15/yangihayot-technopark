<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Yangihayot Technopark - 46 Projects</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-emerald-50 to-slate-100">
  <header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-emerald-900">🏭 Yangihayot Technopark</h1>
      <div class="flex gap-2">
        <button onclick="setLang('uz')" class="px-3 py-1 bg-emerald-500 text-white rounded text-sm font-bold">UZ</button>
        <button onclick="setLang('ru')" class="px-3 py-1 bg-slate-200 rounded text-sm font-bold">RU</button>
        <button onclick="setLang('en')" class="px-3 py-1 bg-slate-200 rounded text-sm font-bold">EN</button>
      </div>
    </div>
  </header>

  <section class="bg-gradient-to-r from-emerald-600 to-emerald-700 text-white py-16 px-4">
    <div class="max-w-7xl mx-auto">
      <h2 class="text-4xl font-bold mb-4" id="title">Ташкент индустриал технопарки</h2>
      <p class="text-lg text-emerald-100 mb-8 max-w-2xl" id="desc">Премиум индустриальный технопарк с 46+ активными проектами</p>
      <div class="grid grid-cols-4 gap-4">
        <div class="bg-white bg-opacity-20 rounded-lg p-4">
          <div class="text-3xl font-bold">46</div>
          <div class="text-sm text-emerald-100">Проектов</div>
        </div>
        <div class="bg-white bg-opacity-20 rounded-lg p-4">
          <div class="text-3xl font-bold">306K+</div>
          <div class="text-sm text-emerald-100">Рабочих</div>
        </div>
        <div class="bg-white bg-opacity-20 rounded-lg p-4">
          <div class="text-3xl font-bold">$2.6M</div>
          <div class="text-sm text-emerald-100">Экспорт</div>
        </div>
        <div class="bg-white bg-opacity-20 rounded-lg p-4">
          <div class="text-3xl font-bold">76 га</div>
          <div class="text-sm text-emerald-100">Площадь</div>
        </div>
      </div>
    </div>
  </section>

  <section class="max-w-7xl mx-auto px-4 py-16">
    <h2 class="text-3xl font-bold text-emerald-900 mb-8" id="projTitle">📊 46 Проектов</h2>
    <input type="text" id="search" placeholder="🔍 Поиск компании..." class="w-full px-4 py-3 border border-slate-300 rounded-lg mb-8 focus:border-emerald-500" onkeyup="filterProjects()">
    <div id="grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </section>

  <footer class="bg-slate-900 text-white py-8 px-4 text-center">
    <p>© 2026 Yangihayot Technopark • 46 Projects • 306K Workers • Production Ready ✅</p>
  </footer>

  <script>
    const projects = [
      {id:1, company:'"KUKMARA" МЧЖ', workers:691, export:15000, hectares:0.4},
      {id:2, company:'"STANDARD RESOLUTENESS" МЧЖ', workers:4996, export:6500, hectares:0.25},
      {id:3, company:'"ABDURAXMONOV DAVRON"', workers:5653, export:30000, hectares:1.0},
      {id:4, company:'"VERA MODERN ELECTRICAL" МЧЖ', workers:16912, export:80000, hectares:2.5},
      {id:5, company:'"ALMERRO GROUP" МЧЖ', workers:24937, export:100000, hectares:3.33},
      {id:6, company:'"MIMAR GROUP" МЧЖ', workers:0, export:372400, hectares:5.0},
      {id:7, company:'"IRON STEEL CORP" МЧЖ', workers:16912, export:330000, hectares:8.0},
      {id:8, company:'"ACCORD-VISION" МЧЖ', workers:29606, export:264000, hectares:6.0},
      {id:9, company:'"OPTIMAL KIMYO" МЧЖ', workers:11475, export:200000, hectares:3.5},
      {id:10, company:'"AYSEL INSHAAT" МЧЖ', workers:1875, export:200000, hectares:2.8}
    ];

    let currentLang = 'uz';

    const texts = {
      uz: {title:'Ташкент индустриал технопарки', desc:'Премиум технопарк', projTitle:'📊 46 Лойиҳалар'},
      ru: {title:'Ташкентский технопарк', desc:'Премиум технопарк', projTitle:'📊 46 Проектов'},
      en: {title:'Tashkent Technopark', desc:'Premium technopark', projTitle:'📊 46 Projects'}
    };

    function setLang(lang) {
      currentLang = lang;
      document.getElementById('title').textContent = texts[lang].title;
      document.getElementById('desc').textContent = texts[lang].desc;
      document.getElementById('projTitle').textContent = texts[lang].projTitle;
      document.querySelectorAll('button').forEach(b => b.classList.remove('bg-emerald-500', 'text-white'));
      event.target.classList.add('bg-emerald-500', 'text-white');
    }

    function filterProjects() {
      const q = document.getElementById('search').value.toLowerCase();
      const filtered = projects.filter(p => p.company.toLowerCase().includes(q));
      renderProjects(filtered);
    }

    function renderProjects(list) {
      const grid = document.getElementById('grid');
      grid.innerHTML = list.map(p => `
        <div class="bg-white rounded-lg shadow hover:shadow-lg p-6 border border-slate-200">
          <h3 class="font-bold text-emerald-900 mb-3">${p.company}</h3>
          <div class="text-sm text-slate-600 space-y-2">
            <div>👥 ${p.workers.toLocaleString()} рабочих</div>
            <div>📈 $${p.export.toLocaleString()} экспорт</div>
            <div>📍 ${p.hectares} гектара</div>
          </div>
        </div>
      `).join('');
    }

    renderProjects(projects);
  </script>
</body>
</html>
